<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GITHUB STATS // CYBER TERMINAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cyber-cyan: #00f5ff;
      --cyber-purple: #7b2ff7;
      --cyber-pink: #ff006e;
      --dark-bg: #0a0e27;
      --darker-bg: #050814;
      --card-bg: #1a1f3a;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--darker-bg);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      color: #fff;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: -10%;
      left: -10%;
      width: 120%;
      height: 120%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(123, 47, 247, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 245, 255, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(255, 0, 110, 0.1) 0%, transparent 50%);
      animation: bgShift 20s ease infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes bgShift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(50px, -30px) scale(1.05); }
      66% { transform: translate(-30px, 50px) scale(1.02); }
    }

    /* Scanline effect */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 245, 255, 0.03) 0px,
        transparent 2px,
        transparent 4px
      );
      pointer-events: none;
      z-index: 1;
      animation: scanline 8s linear infinite;
    }

    @keyframes scanline {
      0% { transform: translateY(0); }
      100% { transform: translateY(100px); }
    }

    .container {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 60px 30px;
      position: relative;
      z-index: 2;
    }

    /* Header with glitch effect */
    .header {
      text-align: center;
      margin-bottom: 80px;
      position: relative;
    }

    .header h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(36px, 8vw, 72px);
      font-weight: 900;
      color: var(--cyber-cyan);
      text-transform: uppercase;
      letter-spacing: 8px;
      position: relative;
      display: inline-block;
      animation: glitchTitle 3s infinite;
      text-shadow: 
        0 0 10px var(--cyber-cyan),
        0 0 20px var(--cyber-cyan),
        0 0 40px var(--cyber-cyan);
    }

    @keyframes glitchTitle {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(-2px, 2px); }
      94% { transform: translate(2px, -2px); }
      96% { transform: translate(-2px, -2px); }
    }

    .header h1::before {
      content: 'GITHUB STATS';
      position: absolute;
      left: 2px;
      top: 0;
      color: var(--cyber-pink);
      opacity: 0;
      animation: glitchBefore 3s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
    }

    @keyframes glitchBefore {
      0%, 90%, 100% { opacity: 0; }
      92% { opacity: 0.7; }
    }

    .header p {
      font-size: 14px;
      color: #7b8ea8;
      margin-top: 20px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 300;
    }

    .terminal-line {
      color: var(--cyber-cyan);
      font-size: 12px;
      margin-top: 15px;
      opacity: 0.6;
    }

    .terminal-line::before {
      content: '> ';
      color: var(--cyber-purple);
    }

    /* Search box with irregular shape */
    .search-container {
      position: relative;
      margin-bottom: 60px;
      animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .search-box {
      display: flex;
      gap: 15px;
      position: relative;
      padding: 8px;
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.1) 0%, rgba(123, 47, 247, 0.1) 100%);
      clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
    }

    .search-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--dark-bg);
      clip-path: polygon(2px 2px, calc(100% - 22px) 2px, calc(100% - 2px) 22px, calc(100% - 2px) calc(100% - 2px), 22px calc(100% - 2px), 2px calc(100% - 22px));
      z-index: -1;
    }

    .search-box input {
      flex: 1;
      padding: 18px 25px;
      border: none;
      background: rgba(26, 31, 58, 0.6);
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      outline: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .search-box input::placeholder {
      color: #7b8ea8;
      font-weight: 300;
    }

    .search-box input:focus {
      background: rgba(26, 31, 58, 0.9);
      box-shadow: inset 0 0 20px rgba(0, 245, 255, 0.2);
    }

    .search-box button {
      padding: 18px 40px;
      background: linear-gradient(135deg, var(--cyber-cyan) 0%, var(--cyber-purple) 100%);
      color: var(--darker-bg);
      border: none;
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
    }

    .search-box button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .search-box button:hover::before {
      width: 300px;
      height: 300px;
    }

    .search-box button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 245, 255, 0.4);
    }

    .search-box button:active {
      transform: translateY(0);
    }

    /* Cards with irregular shapes */
    .cards-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      animation: fadeIn 1s ease 0.3s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .card-wrapper {
      position: relative;
      padding: 10px;
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.15) 0%, rgba(123, 47, 247, 0.15) 100%);
      clip-path: polygon(0 0, calc(100% - 30px) 0, 100% 30px, 100% 100%, 30px 100%, 0 calc(100% - 30px));
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      animation: cardSlide 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .card-wrapper:nth-child(1) {
      animation-delay: 0.1s;
    }

    .card-wrapper:nth-child(2) {
      animation-delay: 0.2s;
    }

    @keyframes cardSlide {
      from {
        opacity: 0;
        transform: translateX(-50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .card-wrapper::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--card-bg);
      clip-path: polygon(3px 3px, calc(100% - 33px) 3px, calc(100% - 3px) 33px, calc(100% - 3px) calc(100% - 3px), 33px calc(100% - 3px), 3px calc(100% - 33px));
      z-index: -1;
    }

    .card-wrapper:hover {
      transform: translateY(-5px);
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.25) 0%, rgba(123, 47, 247, 0.25) 100%);
      box-shadow: 
        0 20px 60px rgba(0, 245, 255, 0.2),
        0 0 40px rgba(123, 47, 247, 0.2);
    }

    .card-inner {
      padding: 35px;
      position: relative;
    }

    .card-wrapper h2 {
      font-family: 'Orbitron', monospace;
      color: var(--cyber-cyan);
      font-size: 14px;
      margin-bottom: 25px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-wrapper h2::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--cyber-cyan);
      box-shadow: 0 0 10px var(--cyber-cyan);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .card-wrapper img {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.5));
    }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 80px 40px;
      position: relative;
    }

    .spinner-container {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 30px;
    }

    .spinner {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 3px solid transparent;
      border-top-color: var(--cyber-cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .spinner:nth-child(2) {
      border-top-color: var(--cyber-purple);
      animation-duration: 1.5s;
      animation-direction: reverse;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading p {
      color: #7b8ea8;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: blink 1.5s ease infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Error message */
    .error {
      background: linear-gradient(135deg, rgba(255, 0, 110, 0.2) 0%, rgba(255, 0, 110, 0.1) 100%);
      border: 2px solid var(--cyber-pink);
      color: #fff;
      padding: 20px 25px;
      margin-bottom: 30px;
      position: relative;
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
      animation: errorSlide 0.3s ease-out;
    }

    @keyframes errorSlide {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .error-close {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 24px;
      font-weight: bold;
      color: var(--cyber-pink);
      transition: transform 0.2s;
    }

    .error-close:hover {
      transform: translateY(-50%) rotate(90deg);
    }

    .info {
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.1) 0%, rgba(123, 47, 247, 0.1) 100%);
      border: 2px solid var(--cyber-cyan);
      color: var(--cyber-cyan);
      padding: 20px 25px;
      margin-bottom: 30px;
      font-size: 13px;
      letter-spacing: 1px;
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 40px 20px;
      }

      .header h1 {
        letter-spacing: 4px;
      }

      .search-box {
        flex-direction: column;
        gap: 10px;
      }

      .search-box button {
        width: 100%;
      }

      .card-inner {
        padding: 20px;
      }
    }

    /* Copy button */
    .copy-btn {
      position: absolute;
      top: 35px;
      right: 35px;
      padding: 10px 20px;
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.2) 0%, rgba(123, 47, 247, 0.2) 100%);
      border: 1px solid var(--cyber-cyan);
      color: var(--cyber-cyan);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
      z-index: 10;
    }

    .copy-btn:hover {
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.4) 0%, rgba(123, 47, 247, 0.4) 100%);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 245, 255, 0.3);
    }

    .copy-btn.copied {
      background: linear-gradient(135deg, rgba(0, 245, 100, 0.4) 0%, rgba(0, 245, 100, 0.2) 100%);
      border-color: #00f564;
      color: #00f564;
    }

    .card-wrapper {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>GITHUB STATS</h1>
      <p>// CYBER DATA VISUALIZATION TERMINAL //</p>
      <div class="terminal-line">SYSTEM ONLINE // READY FOR INPUT</div>
    </div>

    <div class="search-container">
      <div class="search-box">
        <input 
          type="text" 
          id="username" 
          placeholder="ENTER GITHUB USERNAME..."
          autocomplete="off"
        >
        <select id="theme-selector" style="padding: 18px 25px; border: none; background: rgba(26, 31, 58, 0.6); color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 16px; outline: none; cursor: pointer; min-width: 180px;">
          <option value="cyberpunk">CYBERPUNK</option>
          <option value="brutalist">BRUTALIST</option>
          <option value="terminal">TERMINAL</option>
          <option value="luxury">LUXURY</option>
          <option value="vaporwave">VAPORWAVE</option>
        </select>
        <button onclick="searchUser()">EXECUTE</button>
      </div>
    </div>

    <div id="error-container"></div>

    <div class="cards-container" id="cards-container" style="display: none;">
      <div class="card-wrapper" onclick="copyMarkdown('stats')">
        <div class="card-inner">
          <h2>STATISTICS MODULE</h2>
          <button class="copy-btn" id="copy-stats" onclick="event.stopPropagation(); copyMarkdown('stats')">COPY MD</button>
          <img id="stats-card" src="" alt="Stats Card">
        </div>
      </div>

      <div class="card-wrapper" onclick="copyMarkdown('languages')">
        <div class="card-inner">
          <h2>LANGUAGE ANALYSIS</h2>
          <button class="copy-btn" id="copy-languages" onclick="event.stopPropagation(); copyMarkdown('languages')">COPY MD</button>
          <img id="languages-card" src="" alt="Languages Card">
        </div>
      </div>
    </div>

    <div class="loading" id="loading" style="display: none;">
      <div class="spinner-container">
        <div class="spinner"></div>
        <div class="spinner"></div>
      </div>
      <p>LOADING DATA...</p>
    </div>

    <div class="info" id="info" style="display: none;">
      ⚡ ENTER A GITHUB USERNAME TO VISUALIZE STATISTICS
    </div>
  </div>

  <script>
    const usernameInput = document.getElementById('username');
    const themeSelector = document.getElementById('theme-selector');
    const cardsContainer = document.getElementById('cards-container');
    const loadingDiv = document.getElementById('loading');
    const errorContainer = document.getElementById('error-container');
    const infoDiv = document.getElementById('info');
    let currentUsername = '';
    let currentTheme = 'cyberpunk';
    let cachedUserData = null; // Caché de datos del usuario

    window.addEventListener('load', () => {
      infoDiv.style.display = 'block';
    });

    usernameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        searchUser();
      }
    });

    themeSelector.addEventListener('change', () => {
      if (currentUsername && cachedUserData) {
        // Si ya tenemos datos cacheados, solo cambiar el tema sin recargar
        updateCardsWithTheme();
      }
    });

    function showError(message) {
      errorContainer.innerHTML = `
        <div class="error">
          ${message}
          <span class="error-close" onclick="this.parentElement.style.display='none';">×</span>
        </div>
      `;
    }

    function copyMarkdown(type) {
      if (!currentUsername) return;

      const baseUrl = window.location.origin;
      let markdown = '';

      if (type === 'stats') {
        markdown = `![GitHub Stats](${baseUrl}/stats?username=${currentUsername}&theme=${currentTheme})`;
      } else if (type === 'languages') {
        markdown = `![Top Languages](${baseUrl}/top-languages?username=${currentUsername}&theme=${currentTheme})`;
      }

      navigator.clipboard.writeText(markdown).then(() => {
        const btn = document.getElementById(`copy-${type}`);
        const originalText = btn.textContent;
        btn.textContent = '✓ COPIED';
        btn.classList.add('copied');

        setTimeout(() => {
          btn.textContent = originalText;
          btn.classList.remove('copied');
        }, 2000);
      }).catch(err => {
        showError('⚠️ ERROR: FAILED TO COPY TO CLIPBOARD');
      });
    }

    async function updateCardsWithTheme() {
      const theme = themeSelector.value;
      currentTheme = theme;

      if (!cachedUserData) return;

      // Mostrar loading mientras se regeneran las tarjetas
      cardsContainer.style.display = 'none';
      loadingDiv.style.display = 'block';

      const statsCard = document.getElementById('stats-card');
      const languagesCard = document.getElementById('languages-card');

      // Codificar los datos para pasarlos como parámetro
      const statsData = encodeURIComponent(JSON.stringify(cachedUserData.stats));
      const languagesData = encodeURIComponent(JSON.stringify(cachedUserData.languages));

      statsCard.src = `/stats?username=${encodeURIComponent(currentUsername)}&theme=${theme}&data=${statsData}&t=${Date.now()}`;
      languagesCard.src = `/top-languages?username=${encodeURIComponent(currentUsername)}&theme=${theme}&data=${languagesData}&t=${Date.now()}`;

      let loadedCount = 0;
      const onLoad = () => {
        loadedCount++;
        if (loadedCount === 2) {
          loadingDiv.style.display = 'none';
          cardsContainer.style.display = 'grid';
        }
      };

      const onError = (event) => {
        console.error('Image load error:', event);
        loadingDiv.style.display = 'none';
        showError('⚠️ ERROR: FAILED TO LOAD DATA');
      };

      statsCard.onload = onLoad;
      languagesCard.onload = onLoad;
      statsCard.onerror = onError;
      languagesCard.onerror = onError;
    }

    async function searchUser() {
      const username = usernameInput.value.trim();
      const theme = themeSelector.value;

      if (!username) {
        showError('⚠️ ERROR: USERNAME REQUIRED');
        return;
      }

      // Si es el mismo usuario, solo cambiar el tema
      if (username === currentUsername && cachedUserData) {
        currentTheme = theme;
        updateCardsWithTheme();
        return;
      }

      currentUsername = username;
      currentTheme = theme;
      cachedUserData = null; // Limpiar caché al cambiar de usuario
      errorContainer.innerHTML = '';
      infoDiv.style.display = 'none';
      cardsContainer.style.display = 'none';
      loadingDiv.style.display = 'block';

      try {
        // Primero obtener los datos del usuario
        const response = await fetch(`/api/user-data?username=${encodeURIComponent(username)}`);
        
        if (!response.ok) {
          throw new Error('Failed to fetch user data');
        }

        cachedUserData = await response.json();

        // Ahora cargar las tarjetas con los datos cacheados
        updateCardsWithTheme();

      } catch (error) {
        console.error('Error fetching user data:', error);
        loadingDiv.style.display = 'none';
        showError('⚠️ ERROR: FAILED TO LOAD DATA // CHECK USERNAME OR GITHUB TOKEN');
      }
    }
  </script>
</body>
</html>
